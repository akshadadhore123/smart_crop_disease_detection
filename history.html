<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History | AgroVision AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2>🌱 AgroVision AI</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="upload.html">Upload</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="history.html" class="active">History</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- History Section -->
<section class="history-section">
    <h1>Previous Predictions</h1>
    <p>Check all past crop disease predictions below:</p>

    <table class="history-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Image</th>
                <th>Disease</th>
                <th>Confidence</th>
                <th>Date & Time</th>
            </tr>
        </thead>
        <tbody id="historyTableBody">
            <!-- Dynamic content from JS -->
        </tbody>
    </table>
</section>

<script>
    const history = JSON.parse(localStorage.getItem("history")) || [];
    const tbody = document.getElementById("historyTableBody");

    if(history.length === 0){
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="5" style="text-align:center;">No predictions yet!</td>`;
        tbody.appendChild(tr);
    } else {
        history.forEach((item, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><img src="${item.image}" alt="crop" class="history-img" width="100"></td>
                <td>${item.disease}</td>
                <td>${item.confidence}</td>
                <td>${item.date}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
